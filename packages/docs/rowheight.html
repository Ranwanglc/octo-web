<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table row-height resize real-runtime harness (SCHEMA_VERSION 19)</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      td,
      th {
        border: 1px solid #adb5bd;
        padding: 6px 10px;
        min-width: 60px;
        vertical-align: top;
      }
      /* Make the row-resize handle visible/hittable in the harness (production styles live in
         editor/styles.css, which is not loaded here). */
      .octo-table-row-resize {
        background: rgba(66, 99, 235, 0.5) !important;
        cursor: row-resize;
        z-index: 10;
      }
      .octo-table-row-resize-guide {
        background: #f03e3e;
        z-index: 11;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/dev/rowheight.harness.tsx"></script>
  </body>
</html>
